<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0f0d">
<title>Deer Hunter</title>
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%; height: 100dvh;
    background: #0b0f0d; overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  #game {
    position: absolute; cursor: none;
    touch-action: none;
    image-rendering: auto;
  }
  #rotate {
    display: none;
    position: fixed; inset: 0; z-index: 10;
    background: #0d1a12; color: #f2ead0;
    text-align: center;
    font-size: 20px; font-weight: bold; letter-spacing: 1px;
  }
  #rotate .inner { margin-top: 40vh; }
  #rotate .icon { font-size: 44px; display: block; margin-bottom: 14px; }
  /* only nag phones — anything with a short edge under 600px */
  @media (orientation: portrait) and (max-width: 600px) {
    #rotate { display: block; }
  }
</style>
</head>
<body>
<canvas id="game" width="960" height="540"></canvas>
<div id="rotate"><div class="inner"><span class="icon">📱↻</span>ROTATE YOUR PHONE<br><small style="font-weight:normal;font-size:14px">Deer Hunter plays in landscape</small></div></div>
<script src="js/util.js"></script>
<script src="js/artdata.js"></script>
<script src="js/data.js"></script>
<script src="js/shop.js"></script>
<script src="js/assets.js"></script>
<script src="js/sprites.js"></script>
<script src="js/background.js"></script>
<script src="js/audio.js"></script>
<script src="js/input.js"></script>
<script src="js/entities.js"></script>
<script src="js/shooting.js"></script>
<script src="js/hunt.js"></script>
<script src="js/bonus.js"></script>
<script src="js/screens.js"></script>
<script src="js/hud.js"></script>
<script src="js/highscores.js"></script>
<script src="js/main.js"></script>
</body>
</html>
